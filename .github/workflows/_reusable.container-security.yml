name: Reusable — Container Security

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Full image name without tag (e.g. ghcr.io/illumidragui/devsecops-pipeline)'
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: 'Dockerfile'
      app-port:
        description: 'Port the containerised app listens on (used by ZAP)'
        required: false
        type: string
        default: '5000'
      zap-target:
        description: 'URL ZAP will scan'
        required: false
        type: string
        default: 'http://localhost:5000'
      zap-rules-file:
        description: 'Path to ZAP rules file relative to repo root (leave empty to skip)'
        required: false
        type: string
        default: '.zap/rules.tsv'
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

# security-events:write is needed for SARIF uploads.
# Permissions are declared per-job to follow least-privilege.

jobs:
  # -------------------------------------------------------------------------
  # BUILD — builds the Docker image once and pushes to Docker Hub with the
  # commit SHA as the tag. The SHA tag is immutable: it ties the image to the
  # exact commit that produced it. latest is only added in the deploy stage
  # after all scans pass.
  # -------------------------------------------------------------------------
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-ref: ${{ inputs.image-name }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push with SHA tag
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ inputs.image-name }}:${{ github.sha }}

  # -------------------------------------------------------------------------
  # TRIVY — scans the image that was pushed to GHCR (same artifact ArgoCD
  # will deploy). Two-pass pattern:
  #   Pass 1 (blocking): HIGH/CRITICAL with a fix available → fail the job.
  #   Pass 2 (reporting): full SARIF with all severities → GitHub Security tab.
  # ignore-unfixed in pass 1 prevents blocking on CVEs with no available patch.
  # -------------------------------------------------------------------------
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy scan — blocking
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 7

      - name: Trivy scan — full SARIF report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-report.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: false

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-report.sarif

      - name: Trivy summary
        if: always()
        run: |
          echo "## Trivy Container Scan" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-report.json ]; then
            critical=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo "?")
            high=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo "?")
            echo "- CRITICAL: $critical" >> $GITHUB_STEP_SUMMARY
            echo "- HIGH: $high" >> $GITHUB_STEP_SUMMARY
          else
            echo "Report not generated." >> $GITHUB_STEP_SUMMARY
          fi

  # -------------------------------------------------------------------------
  # ZAP — DAST: pulls the same SHA-tagged image from GHCR, starts it locally,
  # and attacks it. Using the registry image (not a local build) guarantees we
  # test the exact binary that will run in the cluster.
  # fail_action: true ensures ZAP can actually block the pipeline.
  # The rules file allows per-finding overrides (FAIL/WARN/IGNORE).
  # -------------------------------------------------------------------------
  zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start app from GHCR image
        run: |
          docker run -d -p ${{ inputs.app-port }}:${{ inputs.app-port }} --name app \
            ${{ inputs.image-name }}:${{ github.sha }}

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app on ${{ inputs.zap-target }}..."
          for i in {1..10}; do
            curl -sf ${{ inputs.zap-target }} && break
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

      - name: Run ZAP scan (with rules file)
        if: inputs.zap-rules-file != '' && hashFiles(inputs.zap-rules-file) != ''
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.zap-target }}
          fail_action: true
          rules_file_name: ${{ inputs.zap-rules-file }}
          artifact_name: zap-report
          cmd_options: '-I'

      - name: Run ZAP scan (no rules file)
        if: inputs.zap-rules-file == '' || hashFiles(inputs.zap-rules-file) == ''
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.zap-target }}
          fail_action: true
          artifact_name: zap-report
          cmd_options: '-I'

      - name: Upload ZAP SARIF to GitHub Security
        if: always() && hashFiles('zap-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap-report.sarif

      - name: ZAP summary
        if: always()
        run: |
          echo "## OWASP ZAP DAST" >> $GITHUB_STEP_SUMMARY
          if [ -f zap-report.json ]; then
            high=$(jq '[.site[]?.alerts[]? | select(.riskcode=="3")] | length' zap-report.json 2>/dev/null || echo "?")
            medium=$(jq '[.site[]?.alerts[]? | select(.riskcode=="2")] | length' zap-report.json 2>/dev/null || echo "?")
            echo "- HIGH: $high" >> $GITHUB_STEP_SUMMARY
            echo "- MEDIUM: $medium" >> $GITHUB_STEP_SUMMARY
          else
            echo "Report not generated." >> $GITHUB_STEP_SUMMARY
          fi

  # -------------------------------------------------------------------------
  # SECURITY REPORT — consolidates all scanner artifacts into a single summary.
  # if: always() runs even when scanners fail so findings are always visible.
  # The condition on individual results is checked explicitly in deploy — this
  # job's success does NOT imply that all scanners passed.
  # -------------------------------------------------------------------------
  security-report:
    name: Consolidated Security Report
    runs-on: ubuntu-latest
    needs: [trivy, zap]
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Generate consolidated summary
        run: |
          echo "# Container Security Report" >> $GITHUB_STEP_SUMMARY
          echo "Run: ${{ github.run_number }} | SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Gate results" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP ZAP | ${{ needs.zap.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: container-security-report-${{ github.run_number }}
          path: all-reports/
          retention-days: 7
