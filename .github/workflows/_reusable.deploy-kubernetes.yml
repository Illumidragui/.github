name: Reusable — Deploy to Kubernetes (ArgoCD)

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Full image name without tag (e.g. illumidragui/syesite)'
        required: true
        type: string
      config-repo:
        description: 'Config repo where ArgoCD reads image tags. Leave empty to skip the PR flow.'
        required: false
        type: string
        default: ''
      config-values-file:
        description: 'Path to values.yaml inside the config repo'
        required: false
        type: string
        default: ''
      helm-repo:
        description: 'Helm chart repo to bump (e.g. Illumidragui/devsecops-helm). Leave empty to skip.'
        required: false
        type: string
        default: ''
      helm-values-file:
        description: 'Path to values.yaml inside the Helm repo'
        required: false
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      CONFIG_REPO_TOKEN:
        description: 'PAT with repo scope on the config repo (required only when config-repo is set)'
        required: false
      GH_PAT:
        description: 'PAT with repo scope on the Helm repo (required only when helm-repo is set)'
        required: false

jobs:
  # -------------------------------------------------------------------------
  # PROMOTE — re-tags the SHA image to latest on Docker Hub.
  # Does NOT rebuild the image. The image that passed Trivy and ZAP is exactly
  # the one that gets the latest tag and goes to the cluster.
  # -------------------------------------------------------------------------
  promote:
    name: Promote SHA image to latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: kubernetes
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Re-tag SHA as latest
        run: |
          docker pull ${{ inputs.image-name }}:${{ github.sha }}
          docker tag  ${{ inputs.image-name }}:${{ github.sha }} \
                      ${{ inputs.image-name }}:latest
          docker push ${{ inputs.image-name }}:latest
          echo "Promoted ${{ github.sha }} → latest" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------------------------
  # HELM-BUMP — direct-commits the new SHA tag into the Helm chart repo.
  # Only runs when helm-repo input is provided. ArgoCD detects the change and
  # triggers a rolling update without manual intervention.
  # Skipped for repos that use a separate config repo PR flow instead.
  # -------------------------------------------------------------------------
  helm-bump:
    name: Bump Helm chart image tag
    runs-on: ubuntu-latest
    needs: promote
    if: inputs.helm-repo != ''
    permissions:
      contents: read
    steps:
      - name: Checkout Helm repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.helm-repo }}
          token: ${{ secrets.GH_PAT }}
          path: helm-repo

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/^\(\s*tag:\s*\).*/\1"${{ github.sha }}"/' \
            helm-repo/${{ inputs.helm-values-file }}

      - name: Commit and push
        run: |
          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.helm-values-file }}
          git commit -m "chore: bump image to ${{ github.sha }}"
          git push

  # -------------------------------------------------------------------------
  # UPDATE-CONFIG — opens a PR in the ArgoCD config repo with the new SHA tag.
  # Skipped when config-repo is empty (use helm-bump direct-commit flow instead).
  # Never auto-merge: the human review step is intentional, not a gap.
  # Uses SHA tag (not latest) so the deployed image is fully traceable.
  # -------------------------------------------------------------------------
  update-config:
    name: Open PR in config repo
    runs-on: ubuntu-latest
    needs: promote
    if: inputs.config-repo != ''
    permissions:
      contents: read
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.config-repo }}
          token: ${{ secrets.CONFIG_REPO_TOKEN }}

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/^\(\s*tag:\s*\).*/\1"${{ github.sha }}"/' \
            ${{ inputs.config-values-file }}

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          commit-message: "chore: update image tag to ${{ github.sha }}"
          branch: "deploy/${{ github.sha }}"
          title: "deploy: ${{ github.sha }}"
          body: |
            Automated image update from [pipeline run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            **Image:** `${{ inputs.image-name }}:${{ github.sha }}`

            All security gates passed:
            - Gitleaks (secret scan)
            - Tests
            - SonarCloud (SAST)
            - Snyk (SCA)
            - Trivy (container scan)
            - OWASP ZAP (DAST)

            > **Do not auto-merge.** ArgoCD will sync automatically once this PR is approved and merged.
          base: main
          delete-branch: true
